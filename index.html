
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор формул для Genially</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #5e35b1; font-size: 24px; margin-top: 0; }
        .instruction { background: #e8eaf6; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        
        /* Шахматный фон для демонстрации прозрачности */
        #preview {
            border: 2px dashed #9575cd;
            min-height: 150px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%), 
                linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #ccc 75%), 
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        #preview img { max-width: 100%; height: auto; }
        
        textarea {
            width: 100%;
            height: 100px;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            font-family: monospace;
            margin-bottom: 10px;
        }
        button {
            background-color: #5e35b1;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover { background-color: #4527a0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Генератор формул без фона</h1>
    
    <div class="instruction">
        <strong>Как это работает:</strong><br>
        1. Сделайте скриншот нужной математической формулы (чтобы текст был на белом фоне).<br>
        2. Просто нажмите <b>Ctrl+V</b> (или Cmd+V) на этой странице.<br>
        3. Редактор удалит белый фон и выдаст код для Genially.
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="preview">
        <span style="background: rgba(255,255,255,0.8); padding: 5px; border-radius: 3px;">Вставьте картинку сюда (Ctrl+V)</span>
    </div>

    <textarea id="codeResult" readonly placeholder="Здесь появится код для вставки..."></textarea>
    <button id="copyBtn">Скопировать код для Genially</button>
</div>

<script>
    // Обработчик вставки картинки
    document.addEventListener('paste', function(e) {
        let items = e.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                let blob = items[i].getAsFile();
                let img = new Image();
                let url = URL.createObjectURL(blob);
                
                img.onload = function() {
                    let canvas = document.getElementById('canvas');
                    let ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    // Получаем пиксели картинки
                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let data = imgData.data;

                    // Проходим по каждому пикселю
                    for (let j = 0; j < data.length; j += 4) {
                        let r = data[j];
                        let g = data[j+1];
                        let b = data[j+2];
                        
                        // Если пиксель близок к белому (R, G, B больше 200), делаем его прозрачным (Alpha = 0)
                        if (r > 200 && g > 200 && b > 200) {
                            data[j+3] = 0; 
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);

                    // Генерируем изображение Data URI
                    let dataURL = canvas.toDataURL('image/png');
                    
                    // Показываем предпросмотр
                    document.getElementById('preview').innerHTML = '<img src="' + dataURL + '">';

                    // Генерируем код для Genially
                    let embedCode = '<div style="width:100%; text-align:center;"><img src="' + dataURL + '" style="max-width:100%; height:auto;"></div>';
                    document.getElementById('codeResult').value = embedCode;
                };
                img.src = url;
            }
        }
    });

    // Кнопка копирования
    document.getElementById('copyBtn').addEventListener('click', function() {
        let copyText = document.getElementById('codeResult');
        if (!copyText.value) {
            alert('Сначала вставьте картинку!');
            return;
        }
        copyText.select();
        document.execCommand('copy');
        
        let originalText = this.innerText;
        this.innerText = '✅ Код скопирован!';
        this.style.backgroundColor = '#43a047';
        
        setTimeout(() => {
            this.innerText = originalText;
            this.style.backgroundColor = '#5e35b1';
        }, 2000);
    });
</script>

</body>
</html>
