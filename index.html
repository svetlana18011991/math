<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор формул для Genially</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #5e35b1; font-size: 24px; margin-top: 0; }
        .instruction { background: #e8eaf6; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        
        #preview {
            border: 2px dashed #9575cd;
            min-height: 150px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%), 
                linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #ccc 75%), 
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        #preview img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        button {
            background-color: #5e35b1;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover { background-color: #4527a0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>Генератор формул без фона</h1>
    
    <div class="instruction">
        <strong>Как это работает:</strong><br>
        1. Сделайте скриншот формулы (на белом фоне).<br>
        2. Нажмите <b>Ctrl+V</b> на этой странице.<br>
        3. Нажмите кнопку копирования ниже.<br>
        4. Перейдите на слайд Genially и просто нажмите <b>Ctrl+V</b>.
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="preview">
        <span style="background: rgba(255,255,255,0.8); padding: 5px; border-radius: 3px;" id="placeholder-text">Вставьте картинку сюда (Ctrl+V)</span>
    </div>

    <button id="copyBtn" disabled>Сначала вставьте картинку</button>
</div>

<script>
    let currentBlob = null;

    document.addEventListener('paste', function(e) {
        let items = e.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                let blob = items[i].getAsFile();
                let img = new Image();
                let url = URL.createObjectURL(blob);
                
                img.onload = function() {
                    let canvas = document.getElementById('canvas');
                    let ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let data = imgData.data;

                    for (let j = 0; j < data.length; j += 4) {
                        let r = data[j];
                        let g = data[j+1];
                        let b = data[j+2];
                        
                        // Убираем белый фон
                        if (r > 200 && g > 200 && b > 200) {
                            data[j+3] = 0; 
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);

                    // Сохраняем картинку в формате Blob для буфера обмена
                    canvas.toBlob(function(newBlob) {
                        currentBlob = newBlob;
                        let blobUrl = URL.createObjectURL(newBlob);
                        
                        document.getElementById('placeholder-text').style.display = 'none';
                        document.getElementById('preview').innerHTML = '<img src="' + blobUrl + '">';
                        
                        let btn = document.getElementById('copyBtn');
                        btn.disabled = false;
                        btn.innerText = 'Скопировать прозрачную картинку';
                    }, 'image/png');
                };
                img.src = url;
            }
        }
    });

    document.getElementById('copyBtn').addEventListener('click', async function() {
        if (!currentBlob) return;
        
        try {
            // Копируем картинку прямо в буфер обмена браузера
            const item = new ClipboardItem({ "image/png": currentBlob });
            await navigator.clipboard.write([item]);
            
            let originalText = this.innerText;
            this.innerText = '✅ Скопировано! Идите в Genially и жмите Ctrl+V';
            this.style.backgroundColor = '#43a047';
            
            setTimeout(() => {
                this.innerText = originalText;
                this.style.backgroundColor = '#5e35b1';
            }, 3000);
        } catch (err) {
            alert('Не удалось скопировать. Попробуйте нажать правой кнопкой мыши по картинке и выбрать "Копировать картинку".');
            console.error(err);
        }
    });
</script>

</body>
</html>
